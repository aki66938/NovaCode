name: Build Check

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "crates/**"
      - "packages/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "package.json"
      - "package-lock.json"
  pull_request:
    branches: [main]
    paths:
      - "apps/**"
      - "crates/**"
      - "packages/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "package.json"
      - "package-lock.json"

jobs:
  build-check:
    name: Build Check (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install Node dependencies
        run: npm ci

      - name: Check frontend build
        run: npm run build --workspace=apps/desktop

      - name: Check Rust compile
        run: cargo check --workspace
